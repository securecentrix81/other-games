<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your password</title>
  <style>
    :root {
      --bg: #0f1115;
      --fg: #e7ecf3;
      --muted: #9aa7b3;
      --accent: #5aa9ff;
      --accent-2: #7ae3b3;
      --danger: #ff6a6a;
      --row-bg: #141821;
      --row-alt: #0f141c;
      --chip: #1a2230;
      --border: #1e2430;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, rgba(15,17,21,0.95), rgba(15,17,21,0.85));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .row {
        /* Change from grid to flex column so text can use 100% width */
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 0px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--row-bg);
    }


    .row:nth-child(even) { background: var(--row-alt); }
    
    /* Highlight class for searched items */
    .row.highlight {
      background: rgba(90, 169, 255, 0.15) !important;
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .value {
    /* Use the full width of the container */
    width: 100%;
    
    /* Prevent wrapping and enable horizontal scrolling */
    white-space: pre;
    overflow-x: auto;
    
    /* Visual tweaks for long sequences */
    font-size: 15px;
    padding: 0; /* Extra space for the scrollbar */
    scrollbar-width: thin; /* Slim scrollbar for Firefox */
    }

    /* Optional: Make the horizontal scrollbar look better on Chrome/Safari */
    .value::-webkit-scrollbar {
    height: 4px;
    }
    .value::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .controls input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b0e14;
      color: var(--fg);
      caret-color: var(--accent);
      outline: none;
    }
    .controls button {
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: #121826;
      color: var(--fg);
      border-radius: 8px;
      cursor: pointer;
    }
    .controls button:hover {
      border-color: var(--accent);
      color: #eaf3ff;
    }

    .sub {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .alphabet {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      background: #0b0e14;
      border: 1px solid var(--border);
      white-space: pre;
      color: #cbd6e2;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    main {
      height: calc(100vh - 92px);
      overflow: auto;
    }

    .footer-note {
      color: var(--muted);
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
    }

    .muted { color: var(--muted); }
    .ok { color: var(--accent-2); }
  </style>
</head>
<body>
  <header>
    <h1>I have your password. Scroll down (or search for it) to find it. </h1>
    <div class="controls">
      <input id="query" type="text" placeholder="Type any exact sequence here (space and special chars allowed) and press Enter or Go" />
      <button id="goBtn" title="Jump to this exact sequence">Go</button>
      <button id="startBtn" title="Jump to the very beginning (length 1)">Start</button>
    </div>
    <div class="sub">
      <span id="status" class="muted"></span>
      <span id="error" class="error"></span>
    </div>
  </header>

  <main id="scroller" aria-live="polite" aria-busy="false">
    <!-- rows are appended here -->
  </main>

  <div class="footer-note">
    • Scroll up or down to dynamically load content in both directions. • Search jumps the list to your exact sequence and highlights it. • DOM is continually pruned so memory stays low.
  </div>

  <script>
    const ALPHABET_STR = ` ~!@#\$%^&*()_+\\\`1234567890-=QWERTYUIOP{}|qwertyuiop[]\\ASDFGHJKL:\\"asdfghjkl;'ZXCVBNM<>?zxcvbnm,./`;
    const ALPHABET = [...ALPHABET_STR];
    const BASE = ALPHABET.length;

    const IDX = new Map(ALPHABET.map((ch, i) => [ch, i]));

    const scroller = document.getElementById('scroller');
    const queryInput = document.getElementById('query');
    const goBtn = document.getElementById('goBtn');
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    const BATCH_SIZE = 500;
    const MAX_ROWS_IN_DOM = 4000;
    const THRESHOLD_PX = 800;

    let bottomDigits = null; // Used for incrementing (appending)
    let topDigits = null;    // Used for decrementing (prepending)
    let loading = false;

    // String/Array Converters
    function digitsToString(digits) {
      let out = '';
      for (let i = 0; i < digits.length; i++) out += ALPHABET[digits[i]];
      return out;
    }

    function stringToDigits(str) {
      const arr = [];
      for (const ch of str) {
        const i = IDX.get(ch);
        if (i == null) {
          const charInfo = ch === ' ' ? '(space)' : ch;
          throw new Error(`Invalid character: ${charInfo}`);
        }
        arr.push(i);
      }
      return arr.length ? arr : [0];
    }

    // Progression mechanics
    function incrementDigits(digits) {
      let i = digits.length - 1;
      while (i >= 0) {
        const v = digits[i] + 1;
        if (v < BASE) {
          digits[i] = v;
          return digits;
        }
        digits[i] = 0;
        i--;
      }
      digits.unshift(0);
      return digits;
    }

    function decrementDigits(digits) {
      if (!digits || (digits.length === 1 && digits[0] === 0)) return null; // Very beginning reached
      let i = digits.length - 1;
      while (i >= 0) {
        if (digits[i] > 0) {
          digits[i]--;
          return digits;
        }
        digits[i] = BASE - 1;
        i--;
      }
      // Handled length underflow (e.g., [0,0] falls back to [94])
      digits.shift();
      return digits;
    }

    function makeRow(str, isHighlight = false) {
      const row = document.createElement('div');
      row.className = 'row' + (isHighlight ? ' highlight' : '');
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = `<span class="chip">len ${str.length}</span>`;
      const val = document.createElement('div');
      val.className = 'value';
      val.textContent = str;
      row.append(val);
      return row;
    }

    function appendBatch(highlightFirst = false) {
      if (loading) return;
      loading = true;
      scroller.setAttribute('aria-busy', 'true');

      const frag = document.createDocumentFragment();
      for (let i = 0; i < BATCH_SIZE; i++) {
        const s = digitsToString(bottomDigits);
        frag.appendChild(makeRow(s, highlightFirst && i === 0));
        incrementDigits(bottomDigits);
      }
      scroller.appendChild(frag);

      // DOM Pruning (Top limit check)
      const rowsDOM = scroller.children;
      if (rowsDOM.length > MAX_ROWS_IN_DOM) {
        const oldScrollHeight = scroller.scrollHeight;
        const scrollTop = scroller.scrollTop;

        const toRemove = rowsDOM.length - MAX_ROWS_IN_DOM;
        for (let i = 0; i < toRemove; i++) {
          scroller.removeChild(rowsDOM[0]);
        }

        // Adjust scroll location so interface isn't disjointed after top elements vanish
        const newScrollHeight = scroller.scrollHeight;
        scroller.scrollTop = Math.max(0, scrollTop - (oldScrollHeight - newScrollHeight));

        // Re-align our top digits state to immediately before the new top
        const firstStr = scroller.firstElementChild.querySelector('.value').textContent;
        topDigits = decrementDigits(stringToDigits(firstStr));
      }

      loading = false;
      scroller.setAttribute('aria-busy', 'false');
      updateStatus();
    }

    function prependBatch() {
      if (loading || !topDigits) return;
      loading = true;
      scroller.setAttribute('aria-busy', 'true');

      const oldScrollHeight = scroller.scrollHeight;
      const frag = document.createDocumentFragment();
      
      let current = topDigits.slice();
      const rows = [];
      
      // Build batch backwards
      for (let i = 0; i < BATCH_SIZE; i++) {
        if (!current) break;
        rows.push(makeRow(digitsToString(current), false));
        current = decrementDigits(current.slice());
      }
      
      topDigits = current;

      // Reverse append so they drop into the DocumentFragment in natural linear order
      for (let i = rows.length - 1; i >= 0; i--) {
        frag.appendChild(rows[i]);
      }
      scroller.insertBefore(frag, scroller.firstChild);

      // Shift window scroll height down dynamically to hold place seamlessly
      const newScrollHeight = scroller.scrollHeight;
      scroller.scrollTop += (newScrollHeight - oldScrollHeight);

      // DOM Pruning (Bottom limit check)
      const totalDOM = scroller.children.length;
      if (totalDOM > MAX_ROWS_IN_DOM) {
        const toRemove = totalDOM - MAX_ROWS_IN_DOM;
        for (let i = 0; i < toRemove; i++) {
          scroller.removeChild(scroller.lastElementChild);
        }

        const lastStr = scroller.lastElementChild.querySelector('.value').textContent;
        bottomDigits = incrementDigits(stringToDigits(lastStr));
      }

      loading = false;
      scroller.setAttribute('aria-busy', 'false');
      updateStatus();
    }

    function updateStatus() {
      const displayLen = bottomDigits ? bottomDigits.length : 1;
      statusEl.textContent = `Showing ${scroller.children.length} combinations in view. Scroll to load.`;
      errorEl.textContent = '';
    }

    function jumpToSequence(str) {
      try {
        const digits = stringToDigits(str);
        scroller.innerHTML = '';
        
        // Define sequence edges
        bottomDigits = digits.slice();
        topDigits = decrementDigits(digits.slice());

        appendBatch(true);

        // Frame prepended material so that our highlighted item sits comfortably inside scrollable view
        if (topDigits) {
          prependBatch();
          const highlighted = scroller.querySelector('.highlight');
          if (highlighted) {
            highlighted.scrollIntoView({ behavior: 'auto', block: 'center' });
          }
        } else {
          scroller.scrollTop = 0;
        }
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    // Handlers
    goBtn.addEventListener('click', () => jumpToSequence(queryInput.value));
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        jumpToSequence(queryInput.value);
      }
    });
    
    startBtn.addEventListener('click', () => {
      queryInput.value = '';
      jumpToSequence(' ');
    });

    scroller.addEventListener('scroll', () => {
      const nearBottom = scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - THRESHOLD_PX;
      if (nearBottom) appendBatch();

      const nearTop = scroller.scrollTop <= THRESHOLD_PX;
      if (nearTop && topDigits) prependBatch();
    });

    // Start
    jumpToSequence('Scroll up or down to find your password');
  </script>
</body>
</html>
