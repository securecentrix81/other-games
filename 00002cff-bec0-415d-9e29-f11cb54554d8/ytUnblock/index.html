<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Viewer Link Converter</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- React and Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #f3f0e8;
            --panel: #f8f5ed;
            --ink: #1d323f;
            --muted: #526571;
            --line: #d5d7cf;
            --accent: #2d6a4f;
            --accent-soft: rgba(45, 106, 79, 0.18);
        }

        body {
            margin: 0;
            font-family: "Manrope", sans-serif;
            background-color: var(--bg);
            color: var(--ink);
        }

        h1, h2, h3 {
            font-family: "Fraunces", serif;
        }

        .card-rise {
            animation: rise 650ms cubic-bezier(0.17, 0.67, 0.3, 1) both;
        }

        .grain {
            background-image: radial-gradient(rgba(0, 0, 0, 0.04) 0.8px, transparent 0.8px);
            background-size: 4px 4px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const YOUTUBE_ID_PATTERN = /^[a-zA-Z0-9_-]{11}$/;
        const VIEWER_BASE_URL = "/youtube-viewer/viewer?v=";

        function extractYoutubeId(input) {
            const value = input.trim();
            if (!value) return null;

            if (YOUTUBE_ID_PATTERN.test(value)) {
                return value;
            }

            let candidate = value;
            if (!/^https?:\/\//i.test(candidate)) {
                candidate = `https://${candidate}`;
            }

            try {
                const url = new URL(candidate);
                const host = url.hostname.replace(/^www\./i, "").toLowerCase();

                if (host === "youtu.be") {
                    const shortId = url.pathname.split("/").filter(Boolean)[0] ?? "";
                    return YOUTUBE_ID_PATTERN.test(shortId) ? shortId : null;
                }

                if (host.endsWith("youtube.com")) {
                    const searchId = url.searchParams.get("v") ?? "";
                    if (YOUTUBE_ID_PATTERN.test(searchId)) {
                        return searchId;
                    }

                    const parts = url.pathname.split("/").filter(Boolean);
                    const knownRoutes = new Set(["embed", "shorts", "live"]);
                    if (parts.length >= 2 && knownRoutes.has(parts[0]) && YOUTUBE_ID_PATTERN.test(parts[1])) {
                        return parts[1];
                    }
                }
            } catch {
                return null;
            }

            return null;
        }

        function App() {
            const [input, setInput] = useState("");
            const [submitted, setSubmitted] = useState("");
            const [copied, setCopied] = useState(false);

            const youtubeId = useMemo(() => extractYoutubeId(submitted), [submitted]);
            const viewerUrl = youtubeId ? `${VIEWER_BASE_URL}${youtubeId}` : "";

            const handleSubmit = (event) => {
                event.preventDefault();
                setSubmitted(input);
                setCopied(false);
            };

            const openInFullscreenWindow = () => {
                if (!viewerUrl) return;

                const popup = window.open(
                    viewerUrl,
                    "youtube-viewer-fullscreen",
                    `popup=yes,noopener=yes,noreferrer=yes,width=${window.screen.availWidth},height=${window.screen.availHeight},left=0,top=0`
                );

                popup?.focus();
            };

            const openInNewTab = () => {
                if (!viewerUrl) return;
                window.open(viewerUrl, "_blank", "noopener,noreferrer");
            };

            const copyUrl = async () => {
                if (!viewerUrl) return;
                try {
                    await navigator.clipboard.writeText(viewerUrl);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch {
                    setCopied(false);
                }
            };

            return (
                <div className="relative min-h-screen overflow-hidden text-[var(--ink)]">
                    <div className="grain pointer-events-none absolute inset-0 opacity-60" />
                    <div className="pointer-events-none absolute left-1/2 top-[-15rem] h-[28rem] w-[28rem] -translate-x-1/2 rounded-full bg-[radial-gradient(circle_at_center,var(--accent-soft)_0%,transparent_70%)] blur-2xl" />

                    <main className="mx-auto flex min-h-screen w-full max-w-4xl items-center px-5 py-10 sm:px-8">
                        <section className="card-rise w-full rounded-[2rem] border border-[var(--line)] bg-[var(--panel)]/90 p-6 shadow-[0_24px_100px_rgba(11,26,34,0.18)] backdrop-blur-md sm:p-10">
                            <h1 className="max-w-2xl text-4xl font-semibold leading-tight sm:text-5xl">
                                Turn any YouTube link into a
                                <span className="ml-2 bg-[linear-gradient(110deg,#2d6a4f,#f77f00)] bg-clip-text text-transparent">
                                    viewer-ready URL
                                </span>
                            </h1>

                            <p className="mt-4 max-w-2xl text-sm text-[var(--muted)] sm:text-base">
                                Paste a standard YouTube URL, a youtu.be short link, or just the raw video ID. Then choose how you
                                want to launch the viewer.
                            </p>

                            <form onSubmit={handleSubmit} className="mt-8 space-y-4">
                                <label className="block text-sm font-medium text-[var(--muted)]" htmlFor="youtube-input">
                                    YouTube URL or ID
                                </label>
                                <textarea
                                    id="youtube-input"
                                    value={input}
                                    onChange={(event) => setInput(event.target.value)}
                                    className="w-full resize-none rounded-2xl border border-[var(--line)] bg-white/80 px-4 py-3 text-base outline-none transition focus:border-[var(--accent)] focus:ring-2 focus:ring-[var(--accent-soft)]"
                                    placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                                    rows="3"
                                />
                                <button
                                    type="submit"
                                    className="inline-flex items-center justify-center rounded-xl bg-[var(--ink)] px-5 py-3 text-sm font-semibold text-white transition hover:translate-y-[-1px] hover:bg-[#0b1a22]"
                                >
                                    Generate Viewer Link
                                </button>
                            </form>

                            {submitted && (
                                <div className="mt-8 rounded-2xl border border-[var(--line)] bg-white/60 p-4 sm:p-5">
                                    {youtubeId ? (
                                        <div className="space-y-4">
                                            <p className="text-sm text-[var(--muted)]">
                                                Detected video ID: <span className="font-semibold text-[var(--ink)]">{youtubeId}</span>
                                            </p>

                                            <div className="rounded-xl border border-[var(--line)] bg-white p-3 text-sm break-all sm:text-base">
                                                {viewerUrl}
                                            </div>

                                            <div className="flex flex-wrap gap-3">
                                                <button
                                                    type="button"
                                                    onClick={openInFullscreenWindow}
                                                    className="rounded-xl bg-[var(--accent)] px-4 py-2.5 text-sm font-semibold text-white transition hover:brightness-105"
                                                >
                                                    Open Fullscreened
                                                </button>
                                                <button
                                                    type="button"
                                                    onClick={openInNewTab}
                                                    className="rounded-xl border border-[var(--line)] bg-white px-4 py-2.5 text-sm font-semibold text-[var(--ink)] transition hover:bg-slate-50"
                                                >
                                                    Open in New Tab
                                                </button>
                                                <button
                                                    type="button"
                                                    onClick={copyUrl}
                                                    className="rounded-xl border border-[var(--line)] bg-white px-4 py-2.5 text-sm font-semibold text-[var(--ink)] transition hover:bg-slate-50"
                                                >
                                                    {copied ? "Copied" : "Copy URL"}
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-sm text-red-700 sm:text-base">
                                            Could not find a valid YouTube ID. Check the input and try again.
                                        </p>
                                    )}
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
