<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown + MathJax Converter</title>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                enableMenu: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        .input-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border);
            background: white;
        }

        .header {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        textarea {
            flex: 1;
            padding: 20px;
            border: none;
            resize: none;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            line-height: 1.5;
        }

        .output-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            background: #eee;
            padding: 5px 5px 0 5px;
            gap: 5px;
        }

        .tab-btn {
            padding: 8px 20px;
            border: none;
            background: #ddd;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            font-weight: bold;
            color: var(--primary);
        }

        .content-area {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        /* Styling for the rendered Markdown */
        #preview-display h1, #preview-display h2 { border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #preview-display code { background: #f1f1f1; padding: 2px 4px; border-radius: 4px; }
        #preview-display blockquote { border-left: 4px solid #ddd; padding-left: 15px; color: #666; }

        #raw-html-display {
            display: none;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: none;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            background: #fafafa;
            color: #333;
        }

        .hint {
            font-size: 11px;
            color: #666;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-section">
        <div class="header">
            Markdown + LaTeX
            <span class="hint">**Bold**, *Italic*, # Header, $E=mc^2$</span>
        </div>
        <textarea id="input" placeholder="Enter Markdown and LaTeX here..."></textarea>
    </div>

    <div class="output-section">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('preview', this)">Preview</button>
            <button class="tab-btn" onclick="switchTab('html', this)">Raw HTML</button>
        </div>
        
        <div class="content-area">
            <div id="preview-display"></div>
            <textarea id="raw-html-display" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const inputArea = document.getElementById('input');
    const previewDisplay = document.getElementById('preview-display');
    const htmlDisplay = document.getElementById('raw-html-display');
    const tabBtns = document.querySelectorAll('.tab-btn');

    let timeout = null;

    // Configure Marked to be less aggressive with escaping characters 
    // that MathJax needs (like underscores in formulas)
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    inputArea.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(convert, 300);
    });

    function convert() {
        const content = inputArea.value;
        
        // 1. Convert Markdown to HTML first
        const rawHTML = marked.parse(content);
        
        // 2. Set the preview div
        previewDisplay.innerHTML = rawHTML;

        // 3. Tell MathJax to process the new HTML content
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([previewDisplay]).then(() => {
                // 4. Update the Raw HTML display after MathJax finished rendering
                htmlDisplay.value = previewDisplay.innerHTML;
            }).catch((err) => console.error(err));
        }
    }

    function switchTab(type, btn) {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (type === 'preview') {
            previewDisplay.style.display = 'block';
            htmlDisplay.style.display = 'none';
        } else {
            previewDisplay.style.display = 'none';
            htmlDisplay.style.display = 'block';
        }
    }

    // Initial content
    inputArea.value = `# Math & Markdown
This is **bold** and this is *italic*.

## The Quadratic Formula
When $ax^2 + bx + c = 0$, then:
$$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$

- List item 1
- List item 2 with inline math: $\\pi r^2$`;

    convert();
</script>

</body>
</html>
