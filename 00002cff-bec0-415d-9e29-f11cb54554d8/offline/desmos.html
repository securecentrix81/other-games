

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">


  <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>



</head>
<body>
  <div id="calculator" style="position:fixed;top:0;left:0;width:100%;height:100%;"></div>

  <script>
    var elt = document.getElementById('calculator');
    var calculator = Desmos.GraphingCalculator(elt);
    let saveData = localStorage.getItem("desmos-2d-save-data")
      
      if (saveData) {
          calculator.setState(JSON.parse(saveData));
      }
      
      setInterval(() => {
        localStorage.setItem("desmos-2d-save-data", JSON.stringify(calculator.getState()))
      })
  </script>
  <script>
  window.TestBridge = {};
</script>

</body>
</html>
